name: Continuous Integration

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
              with:
                  install: true
                  cache: true
                  experimental: true
            - name: Run tests
              run: mise run test
            - name: Run lint
              run: mise run lint
            - name: Run ua-update
              run: mise run ua-update
