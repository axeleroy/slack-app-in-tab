name: Continuous Integration

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
              with:
                  install: true
                  cache: true
                  experimental: true
            - name: Run tests
              run: mise run test
            - name: Run lint
              run: mise run lint
            - name: Run ua-update
              run: mise run ua-update
