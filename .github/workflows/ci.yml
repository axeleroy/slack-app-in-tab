name: Continuous Integration

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
              with:
                  install: true
                  cache: true
                  experimental: true
            - name: Run tests
              run: mise run test
            - name: Run lint
              run: mise run lint
            - name: Run ua-update
              run: mise run ua-update
